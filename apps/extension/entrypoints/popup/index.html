<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cheatdex Collector</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<header>
			<h1>Cheatdex Collector</h1>
			<button id="open-options" type="button" class="link">設定</button>
		</header>

		<section id="status" class="status" hidden></section>

		<section class="target">
			<label>
				Game ID
				<input id="game-id" type="number" min="1" inputmode="numeric" placeholder="例: 1" />
			</label>
			<p class="hint">Cheatdex で作成済みの Game ID を 1 度だけ指定します（Game/Platform 共通）。</p>
		</section>

		<section class="actions">
			<button id="scan" type="button">このページを再スキャン</button>
			<div class="select-actions">
				<button id="select-all" type="button" class="link">全選択</button>
				<button id="select-none" type="button" class="link">全解除</button>
			</div>
		</section>

		<section>
			<p id="summary" class="summary"></p>
			<ul id="cheat-list" class="cheat-list"></ul>
		</section>

		<footer>
			<button id="submit" type="button" class="primary">選択分を一括登録</button>
		</footer>

		<script type="module" src="./main.ts"></script>
	</body>
</html>
