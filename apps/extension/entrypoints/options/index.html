<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cheatdex Collector - 設定</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<main>
			<h1>Cheatdex Collector 設定</h1>

			<form id="settings-form">
				<label>
					API baseURL
					<input id="base-url" type="url" placeholder="https://cheatdex.example.com" />
					<span class="hint">空欄の場合はビルド時のデフォルト値を使用します。</span>
				</label>

				<label>
					Personal Access Token (PAT)
					<input id="pat" type="password" autocomplete="off" placeholder="cheatdex で発行した PAT を貼り付け" />
					<span class="hint">PAT は端末のローカルストレージにのみ保存されます（同期しません）。</span>
				</label>

				<button type="submit" class="primary">保存</button>
				<p id="status" class="status" hidden></p>
			</form>
		</main>

		<script type="module" src="./main.ts"></script>
	</body>
</html>
